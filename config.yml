#   # Edit config.yml with your details
#   python -m generator.main

# Your GitHub username (required)
username: pedrocastro210

# Profile information displayed in the galaxy header
profile:
  name: "Pedro Castro"
  tagline: "Full Stack Developer & AI Explorer"
  company: "Vertigo - Digital Intelligence For Business"
  location: "Resende, RJ"
  bio: |
    Criando soluções completas que tornam a vida dos desenvolvedores e usuários mais simples.
    Desenvolvedor Full-Stack apaixonado por construir sistemas escaláveis, do back-end ao front-end, com foco em performance, usabilidade e qualidade de código. Experiente em integrar diferentes camadas da aplicação, criando produtos consistentes e eficientes, sempre valorizando a experiência do desenvolvedor e o ecossistema.
  philosophy: '"O melhor código não é só o que funciona, mas o que capacita outros a irem além."'

# Social links displayed at the bottom of the profile
social:
  email: "phfdecastro@hotmail.com"
  linkedin: "pedrocastro210"
  website: "https://portfolio-pedrocastro.vercel.app/"

# Galaxy arms represent your core focus areas
# Each arm spirals out from the center with its own color and tech items
# Available colors: "synapse_cyan", "dendrite_violet", "axon_amber"
galaxy_arms:
  - name: "Frontend"
    color: "dendrite_violet"
    items:
      - "TypeScript"
      - "React"
      - "Redux"
  - name: "Backend"
    color: "synapse_cyan"
    items:
      - "Node.js"
      - "Python"
      - "PostgreSQL"
  - name: "Infraestrutura & Desenvolvimento"
    color: "axon_amber"
    items:
      - "Docker"
      - "Liferay"
      - "GIT"
      - "n8n"

# Featured projects shown as constellation stars
# Each project needs:
#   repo: "owner/repo-name"   — GitHub repository path
#   arm: 0-2                  — Which galaxy arm to associate with (index)
#   description: "..."        — Short description shown on the card
projects:
  - repo: "pedrocastro210/burguer-dev"
    arm: 0
    description: "Projeto desenvolvido em TypeScript e React com o objetivo de fornecer uma experiência de compra online agradável e intuitiva para os clientes da hamburgueria."
  - repo: "pedrocastro210/bandkamp-api"
    arm: 1
    description: "Projeto desenvolvido em Python utilizando o framework Django e o Django Rest Framework. O objetivo dessa API é fornecer funcionalidades para cadastro e gerenciamento de usuários, álbuns e músicas."

# Theme color overrides (optional — defaults to deep space palette)
# All values must be valid hex color codes (#RRGGBB)
theme:
  void: "#080c14"              # Darkest background
  nebula: "#0f1623"            # Card backgrounds
  star_dust: "#1a2332"         # Borders, dividers
  synapse_cyan: "#00d4ff"      # Primary accent (arm color 1)
  dendrite_violet: "#a78bfa"   # Secondary accent (arm color 2)
  axon_amber: "#ffb020"        # Tertiary accent (arm color 3)
  text_bright: "#f1f5f9"       # Primary text
  text_dim: "#94a3b8"          # Secondary text
  text_faint: "#64748b"        # Muted text, labels

# Stats configuration — which metrics to show on the telemetry card
stats:
  metrics:
    - "commits"
    - "stars"
    - "prs"
    - "issues"
    - "repos"

# Language display settings
languages:
  # exclude:                     # Languages to hide from the telemetry chart
    # - "HTML"
    # - "CSS"
    # - "Shell"
    # - "Makefile"
  max_display: 8               # Maximum number of languages to show
